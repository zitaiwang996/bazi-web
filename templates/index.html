<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命理推算系统 — 金镖门盲派</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --bg: #1a1410;
    --bg-card: #231d16;
    --bg-input: #2a2219;
    --gold: #c8a45c;
    --gold-light: #e0c878;
    --gold-dark: #8b6914;
    --text: #e8ddd0;
    --text-dim: #9a8e7e;
    --text-muted: #6b5f50;
    --red: #c0392b;
    --red-light: #e74c3c;
    --blue: #5b7eb5;
    --green: #5a8f5a;
    --border: #3a3024;
    --border-light: #4a4034;
    --fire: #d4734e;
    --water: #4a7db5;
    --wood: #5a9e5a;
    --earth: #b8965a;
    --metal: #c4a44a;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* Background decoration */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(200,164,92,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(200,164,92,0.04) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* ========== HEADER ========== */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-family: 'Noto Serif SC', 'SimSun', serif;
    font-size: 2.4em;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(200,164,92,0.2);
  }
  .header .subtitle {
    font-size: 0.95em;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    font-weight: 300;
  }
  .header .divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  /* ========== FORM CARD ========== */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 36px;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.15em;
    color: var(--gold-light);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.08em;
  }

  .form-row {
    display: flex;
    gap: 20px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    min-width: 160px;
  }
  .form-group label {
    font-size: 0.85em;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .form-group input,
  .form-group select {
    background: var(--bg-input);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 1em;
    font-family: inherit;
    transition: all 0.2s;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,164,92,0.15);
  }
  .form-group input[type="date"],
  .form-group input[type="time"] {
    color-scheme: dark;
  }

  .gender-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-input);
  }
  .gender-toggle button {
    flex: 1;
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    font-size: 1em;
    transition: all 0.2s;
  }
  .gender-toggle button.active {
    background: var(--gold-dark);
    color: #fff;
    font-weight: 600;
  }
  .gender-toggle button:hover:not(.active) {
    background: rgba(200,164,92,0.15);
    color: var(--text);
  }

  .btn-submit {
    padding: 12px 36px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #1a1410;
    border: none;
    border-radius: 8px;
    font-size: 1.05em;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.3s;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(200,164,92,0.25);
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(200,164,92,0.4);
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
  }
  .btn-submit:active {
    transform: translateY(0);
  }

  .shichen-display {
    font-size: 0.85em;
    color: var(--gold-light);
    margin-top: 4px;
    min-height: 20px;
  }

  /* ========== RESULTS ========== */
  #results {
    display: none;
  }

  .bazi-display {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 20px 0 32px;
  }
  .bazi-pillar {
    text-align: center;
    min-width: 110px;
  }
  .bazi-pillar .label {
    font-size: 0.8em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .bazi-pillar .chars {
    font-family: 'Noto Serif SC', 'SimSun', serif;
    font-size: 2em;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 4px;
  }
  .bazi-pillar .nayin {
    font-size: 0.8em;
    color: var(--text-muted);
  }
  .bazi-pillar.day-master .chars {
    color: var(--gold-light);
    text-shadow: 0 0 12px rgba(200,164,92,0.3);
  }

  /* Section grid */
  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
  }

  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }
  .section h3 {
    font-family: 'Noto Serif SC', serif;
    color: var(--gold-light);
    font-size: 1.05em;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9em;
  }
  th, td {
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--text-dim);
    font-weight: 500;
    font-size: 0.85em;
  }
  td {
    color: var(--text);
  }
  tr:last-child td {
    border-bottom: none;
  }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 0.8em;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .tag-warning { background: rgba(192,57,43,0.2); color: var(--red-light); }
  .tag-good { background: rgba(90,143,90,0.2); color: #5a9e5a; }
  .tag-info { background: rgba(200,164,92,0.15); color: var(--gold-light); }
  .tag-neutral { background: rgba(154,142,126,0.15); color: var(--text-dim); }

  /* Dayun steps */
  .dayun-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .dayun-item {
    flex: 1;
    min-width: 120px;
    background: var(--bg-input);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }
  .dayun-item.current {
    border-color: var(--gold);
    background: rgba(200,164,92,0.1);
  }
  .dayun-item .dy-pillar {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.2em;
    font-weight: 700;
    color: var(--text);
  }
  .dayun-item.current .dy-pillar {
    color: var(--gold-light);
  }
  .dayun-item .dy-age {
    font-size: 0.75em;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Branch rels */
  .rel-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  /* Warning / Highlight boxes */
  .highlight-box {
    background: var(--bg-input);
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 0.9em;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }
  .loading::after {
    content: '...';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }

  /* Error */
  .error-box {
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 8px;
    padding: 16px;
    margin: 16px 0;
    color: var(--red-light);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    padding: 24px;
    color: var(--text-muted);
    font-size: 0.8em;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .header h1 { font-size: 1.6em; }
    .card { padding: 20px; }
    .form-row { flex-direction: column; }
    .bazi-pillar .chars { font-size: 1.5em; }
    .section-grid { grid-template-columns: 1fr; }
  }

  /* Print-friendly */
  @media print {
    body { background: white; color: black; }
    .card, .section { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .btn-submit, .form-row { display: none; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>八字命理推算</h1>
    <div class="divider"></div>
    <div class="subtitle">金镖门盲派 · 天文节气精确排盘 · 1900-2100</div>
  </div>

  <!-- Input Form -->
  <div class="card">
    <div class="card-title">📅 输入出生信息</div>
    <div class="form-row">
      <div class="form-group">
        <label>出生日期（公历）</label>
        <input type="date" id="birthDate" required>
      </div>
      <div class="form-group">
        <label>出生时间</label>
        <input type="time" id="birthTime" value="12:00" required>
        <div class="shichen-display" id="shichenDisplay"></div>
      </div>
      <div class="form-group">
        <label>性别</label>
        <div class="gender-toggle" id="genderToggle">
          <button data-gender="male" class="active">男</button>
          <button data-gender="female">女</button>
        </div>
      </div>
      <div class="form-group" style="justify-content: flex-end;">
        <button class="btn-submit" onclick="calculate()">开始排盘</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading" class="card loading" style="display:none;">正在推算命盘</div>

  <!-- Error -->
  <div id="errorBox" class="error-box" style="display:none;"></div>

  <!-- Results -->
  <div id="results">
    <!-- Bazi display -->
    <div class="card" style="text-align:center;">
      <div class="card-title">🏮 八字命盘</div>
      <div class="bazi-display" id="baziDisplay"></div>
      <div style="margin-top:12px; color: var(--text-dim); font-size:0.9em;">
        日主 <strong style="color:var(--gold-light);" id="riGanLabel"></strong>
        &nbsp;|&nbsp; 出生时辰: <strong id="chineseHourLabel"></strong>
        &nbsp;|&nbsp; 当前虚岁: <strong id="currentAgeLabel"></strong>
      </div>
    </div>

    <!-- Analysis sections -->
    <div class="section-grid">
      <!-- Dayun -->
      <div class="section" style="grid-column: 1 / -1;">
        <h3>📈 大运排盘 <span style="font-size:0.8em;color:var(--text-dim);" id="dayunDirection"></span></h3>
        <div class="dayun-list" id="dayunList"></div>
      </div>

      <!-- Nayin + Changsheng -->
      <div class="section">
        <h3>🔮 纳音五行</h3>
        <table id="nayinTable">
          <thead><tr><th>柱位</th><th>干支</th><th>纳音</th><th>五行</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section">
        <h3>🌿 十二长生（日主）</h3>
        <table id="changshengTable">
          <thead><tr><th>柱位</th><th>地支</th><th>十二长生</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Ten Gods -->
      <div class="section">
        <h3>🔗 十神（天干）</h3>
        <table id="shishenStemTable">
          <thead><tr><th>柱位</th><th>天干</th><th>十神</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section">
        <h3>📦 藏干十神</h3>
        <table id="shishenCanganTable">
          <thead><tr><th>柱位</th><th>地支</th><th>藏干</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Kong Wang + Branch Rels -->
      <div class="section">
        <h3>⛔ 空亡</h3>
        <div id="kongWangInfo"></div>
        <table id="kongWangTable" style="margin-top:12px;">
          <thead><tr><th>柱位</th><th>地支</th><th>空亡</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section">
        <h3>🔄 地支关系</h3>
        <div id="branchRels"></div>
      </div>

      <!-- Wang Shuai + Taiyuan -->
      <div class="section">
        <h3>⚖️ 日主旺衰分析</h3>
        <div id="wangshuaiInfo"></div>
      </div>

      <div class="section">
        <h3>🌱 胎元 & 五行统计</h3>
        <div id="taiyuanInfo"></div>
        <div id="wuxingStats" style="margin-top:12px;"></div>
      </div>

      <!-- Shishen counts -->
      <div class="section" style="grid-column: 1 / -1;">
        <h3>📊 十神分布</h3>
        <div id="shishenCounts" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    金镖门盲派八字 · 天文节气数据 1900-2100 · v1.0
  </div>
</div>

<script>
// ========== Gender Toggle ==========
document.querySelectorAll('#genderToggle button').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#genderToggle button').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

function getGender() {
  return document.querySelector('#genderToggle button.active').dataset.gender;
}

// ========== Shichen auto-display ==========
const hourNames = ['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'];
const hourMap = [[23,0],[1,1],[3,2],[5,3],[7,4],[9,5],[11,6],[13,7],[15,8],[17,9],[19,10],[21,11]];

function getShichen(h, m) {
  const total = h * 60 + m;
  if (total >= 1380 || total < 60) return '子时';
  for (const [startH, idx] of hourMap) {
    const endH = (startH + 2) % 24;
    if (startH === 23) continue; // handled above
    if (h >= startH && h < endH) return hourNames[idx];
  }
  return '子时';
}

document.getElementById('birthTime').addEventListener('change', updateShichen);
function updateShichen() {
  const t = document.getElementById('birthTime').value;
  if (!t) return;
  const [h, m] = t.split(':').map(Number);
  document.getElementById('shichenDisplay').textContent = '对应时辰: ' + getShichen(h, m);
}
// Initial
updateShichen();

// Set today as default date
const today = new Date().toISOString().split('T')[0];
document.getElementById('birthDate').value = '2000-01-01';

// ========== Calculate ==========
async function calculate() {
  const birthDate = document.getElementById('birthDate').value;
  const birthTime = document.getElementById('birthTime').value;
  const gender = getGender();

  if (!birthDate || !birthTime) {
    showError('请填写完整的出生日期和时间');
    return;
  }

  // Show loading
  document.getElementById('loading').style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';

  try {
    const resp = await fetch('/api/calculate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        solar_date: birthDate,
        time: birthTime,
        gender: gender
      })
    });

    const data = await resp.json();
    if (data.error) {
      showError(data.error);
      return;
    }

    renderResults(data);
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({behavior: 'smooth'});
  } catch (e) {
    showError('网络错误，请确认服务器正在运行: ' + e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}

// ========== Render Results ==========
function renderResults(d) {
  // Bazi display
  const pillars = [
    {name:'年柱', val:d.year_pillar},
    {name:'月柱', val:d.month_pillar},
    {name:'日柱', val:d.day_pillar, master:true},
    {name:'时柱', val:d.time_pillar},
  ];
  const baziDiv = document.getElementById('baziDisplay');
  baziDiv.innerHTML = pillars.map(p => `
    <div class="bazi-pillar ${p.master?'day-master':''}">
      <div class="label">${p.name}${p.master?' (日主)':''}</div>
      <div class="chars">${p.val}</div>
      <div class="nayin">${d.nayin.find(n=>n.pillar===p.val)?.nayin || '?'}</div>
    </div>
  `).join('');

  document.getElementById('riGanLabel').textContent = d.ri_gan + ' (' + wuxingName(d.ri_gan) + ')';
  document.getElementById('chineseHourLabel').textContent = d.chinese_hour;
  document.getElementById('currentAgeLabel').textContent = d.current_age_xusui + '岁(虚) / ' + d.current_age_precise + '岁(周)';

  // Dayun
  document.getElementById('dayunDirection').textContent =
    `[${d.dayun.direction}]  起运: ${d.dayun.qiyun_age_years}岁${d.dayun.qiyun_age_months}个月  ` +
    `(距${d.dayun.target_jie || ''} ${d.dayun.delta_days}天)`;
  document.getElementById('dayunList').innerHTML = d.dayun.steps.map(s => `
    <div class="dayun-item ${d.current_dayun && s.pillar===d.current_dayun.pillar ? 'current' : ''}">
      <div class="dy-pillar">${s.pillar}</div>
      <div class="dy-age">${s.start_age}-${s.end_age}岁</div>
    </div>
  `).join('');

  // Nayin table
  document.querySelector('#nayinTable tbody').innerHTML = d.nayin.map(n => `
    <tr><td>${n.name}</td><td>${n.pillar}</td><td>${n.nayin}</td><td>${n.wuxing}</td></tr>
  `).join('');

  // Changsheng table
  document.querySelector('#changshengTable tbody').innerHTML = d.changsheng.map(c => `
    <tr><td>${c.name}</td><td>${c.branch}</td><td>${c.stage}</td></tr>
  `).join('');

  // Shishen stems
  document.querySelector('#shishenStemTable tbody').innerHTML = d.shishen_stems.map(s => `
    <tr><td>${s.name}</td><td><strong>${s.stem}</strong></td><td>${shishenTag(s.shishen)}</td></tr>
  `).join('');

  // Shishen cangan
  document.querySelector('#shishenCanganTable tbody').innerHTML = d.shishen_cangan.map(sc => `
    <tr>
      <td>${sc.name}</td>
      <td>${sc.branch}</td>
      <td>${sc.hiddens.map(h => `${h.stem}(${h.shishen})`).join('、')}</td>
    </tr>
  `).join('');

  // Kong wang
  document.getElementById('kongWangInfo').innerHTML =
    `<div class="highlight-box">日柱 <strong>${d.day_pillar}</strong> → 空亡: <span class="tag tag-warning">${d.kong_branches.join(' ')}</span></div>`;
  document.querySelector('#kongWangTable tbody').innerHTML = d.kong_wang.map(k => `
    <tr>
      <td>${k.name}</td>
      <td>${k.branch}</td>
      <td>${k.is_kong ? '<span class="tag tag-warning">坐空亡!</span>' : '<span class="tag tag-neutral">—</span>'}</td>
    </tr>
  `).join('');

  // Branch relations
  const rels = d.branch_relations;
  document.getElementById('branchRels').innerHTML = `
    ${rels['冲'].length ? '<div class="highlight-box">⚡ <strong>六冲:</strong> ' + rels['冲'].map(r => '<span class="tag tag-warning">'+r+'</span>').join(' ') + '</div>' : ''}
    ${rels['合'].length ? '<div class="highlight-box">🤝 <strong>六合:</strong> ' + rels['合'].map(r => '<span class="tag tag-info">'+r+'</span>').join(' ') + '</div>' : ''}
    ${rels['穿'].length ? '<div class="highlight-box">⚠️ <strong>穿害:</strong> ' + rels['穿'].map(r => '<span class="tag tag-warning">'+r+'</span>').join(' ') + '</div>' : ''}
    ${rels['拱'].length ? '<div class="highlight-box">🌈 <strong>拱局:</strong> ' + rels['拱'].map(r => '<span class="tag tag-good">'+r+'</span>').join(' ') + '</div>' : ''}
    ${rels['三合'].length ? '<div class="highlight-box">🔺 <strong>三合:</strong> ' + rels['三合'].map(r => '<span class="tag tag-info">'+r+'</span>').join(' ') + '</div>' : ''}
    ${rels['刑'].length ? '<div class="highlight-box">💢 <strong>相刑:</strong> ' + rels['刑'].map(r => '<span class="tag tag-warning">'+r+'</span>').join(' ') + '</div>' : ''}
    ${!rels['冲'].length && !rels['合'].length && !rels['穿'].length && !rels['拱'].length && !rels['三合'].length && !rels['刑'].length ? '<span class="tag tag-neutral">无明显特殊关系</span>' : ''}
  `;

  // Wang shuai
  document.getElementById('wangshuaiInfo').innerHTML = `
    <div class="highlight-box">
      <strong>日主 ${d.ri_gan}</strong> | 月令: ${d.changsheng[1].stage} |
      支撑 ${d.wangshuai.support} vs 克泄 ${d.wangshuai.oppose} |
      综合: <span class="tag ${d.wangshuai.level==='身旺'?'tag-good':(d.wangshuai.level==='身弱'?'tag-warning':'tag-info')}">${d.wangshuai.level}</span>
    </div>
  `;

  // Taiyuan
  document.getElementById('taiyuanInfo').innerHTML = `
    <div class="highlight-box">
      <strong>胎元:</strong> ${d.taiyuan} (${d.taiyuan_nayin}) — 月柱${d.month_pillar}天干进一、地支进三
    </div>
  `;

  // Wuxing stats
  const wxColors = {木:'var(--wood)',火:'var(--fire)',土:'var(--earth)',金:'var(--metal)',水:'var(--water)'};
  document.getElementById('wuxingStats').innerHTML = Object.entries(d.wuxing_counts).map(([wx,c]) =>
    `<span style="display:inline-block;margin:4px 8px;color:${wxColors[wx]||'var(--text)'};">
      ${wx}: ${'●'.repeat(Math.min(c, 15))} (${c})
    </span>`
  ).join('<br>');

  // Shishen counts
  const ssSorted = Object.entries(d.shishen_counts).sort((a,b) => b[1]-a[1]);
  document.getElementById('shishenCounts').innerHTML = ssSorted.map(([ss,c]) =>
    `<span class="tag ${ss.includes('杀')||ss.includes('伤')?'tag-warning':(ss.includes('财')||ss.includes('官')?'tag-info':'tag-neutral')}" style="font-size:0.9em;">
      ${ss}: ${c}
    </span>`
  ).join(' ');
}

function shishenTag(ss) {
  const cls = ss.includes('杀')||ss.includes('伤')?'tag-warning':
              ss.includes('财')||ss.includes('官')||ss.includes('印')?'tag-info':'tag-neutral';
  return `<span class="tag ${cls}">${ss}</span>`;
}

function wuxingName(gan) {
  const m = {甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
  return m[gan] || '?';
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    calculate();
  }
});
</script>

</html>
